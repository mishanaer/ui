version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Minor + patch bundled into two PRs per week (dev vs prod).
      # Majors fall outside groups and get individual PRs for manual review.
      dev-deps:
        dependency-type: development
        update-types:
          - minor
          - patch
      prod-deps:
        dependency-type: production
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      actions:
        patterns:
          - "*"
